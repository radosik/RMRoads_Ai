name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            e2e-tests/package-lock.json

      - name: Install Wasp CLI
        # 0.21+ ships as an npm package; the old curl installer requires
        # a -v <version> argument and points users at this command anyway.
        run: npm install -g @wasp.sh/wasp-cli

      - name: wasp version
        run: wasp version

      - name: Install app deps
        working-directory: app
        run: npm ci

      - name: Generate Wasp SDK
        # `wasp build` validates main.wasp + schema.prisma and generates
        # the SDK and server/client output under .wasp/build/. No database
        # connection required for this step — only for migrations.
        working-directory: app
        run: wasp build

      - name: Typecheck user code
        working-directory: app
        run: npm exec tsc -- --noEmit
