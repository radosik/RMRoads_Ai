name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Wasp 0.23 requires Node 24.14.1+; bump this when Wasp's
          # node engine minimum changes.
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            e2e-tests/package-lock.json

      - name: Install Wasp CLI
        # 0.21+ ships as an npm package with platform-specific binaries as
        # optionalDependencies. Global installs sometimes skip optionals, so
        # we install the linux-x64-glibc binary explicitly to be safe.
        # `--include=optional` is belt-and-braces for older npm versions.
        run: |
          npm install -g --include=optional \
            @wasp.sh/wasp-cli \
            @wasp.sh/wasp-cli-linux-x64-glibc

      - name: wasp version
        run: wasp version

      - name: Install app deps
        working-directory: app
        run: npm ci

      - name: Generate Wasp SDK
        # `wasp build` validates main.wasp + schema.prisma and generates
        # the SDK and server/client output under .wasp/build/. No database
        # connection required for this step — only for migrations.
        working-directory: app
        run: wasp build

      - name: Typecheck user code
        working-directory: app
        run: npm exec tsc -- --noEmit
