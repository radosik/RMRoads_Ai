name: Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the fields below — vague reports
        ("it doesn't work") can't be acted on.

        For security issues, **don't** open a public issue — see [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you see? What did you expect to see?
      placeholder: |
        I clicked "Approve" on a critical exception and...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: A numbered list someone else could follow to hit the same bug.
      placeholder: |
        1. Sign in as a planner
        2. Open the workbench at /rmroads
        3. Click the row for SHP-1001
        4. ...
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit SHA or branch
      description: `git rev-parse HEAD` in your local clone, or the branch name.
      placeholder: e.g. main @ 5ebfc79
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other (please mention in "What happened?")
    validations:
      required: true

  - type: input
    id: locale
    attributes:
      label: Active locale
      description: en / de / fr / es / other.
      placeholder: en
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Browser console + server log output
      description: Any errors from DevTools console or the `wasp start` terminal.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: I've checked
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I'm on a recent `main` (not a years-old fork).
          required: true
